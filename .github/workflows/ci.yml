name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: status_tracker
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: status_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U status_tracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=status_tracker_test;Username=status_tracker;Password=test_password

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
