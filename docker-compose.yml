name: status-tracker

services:

  # Application
  status-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: status-tracker-app
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=statustracker;Username=app;Password=${POSTGRES_PASSWORD}"
      Seq__ServerUrl: "http://seq:5341"
      ALLOWED_EMAILS: "${ALLOWED_EMAILS}"
      # OAuth credentials — ASP.NET Core maps Google__ClientId -> Google:ClientId, etc.
      # These must use the __ separator so Program.cs can read them as nested config keys.
      Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      Microsoft__ClientId: "${MICROSOFT_CLIENT_ID}"
      Microsoft__ClientSecret: "${MICROSOFT_CLIENT_SECRET}"
      GitHub__ClientId: "${GITHUB_CLIENT_ID}"
      GitHub__ClientSecret: "${GITHUB_CLIENT_SECRET}"
      ElasticApm__ServerUrl: "${ElasticApm__ServerUrl:-}"
      ElasticApm__ServiceName: "${ElasticApm__ServiceName:-status-tracker}"
      ElasticApm__Environment: "${ElasticApm__Environment:-development}"
    healthcheck:
      # Mirror the Dockerfile HEALTHCHECK so that service dependency checks work correctly.
      # start_period allows for EF migrations and DB connection on a cold start.
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - internal

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: status-tracker-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432" # local dev access; remove or restrict in production
    environment:
      POSTGRES_DB: statustracker
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d statustracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Seq — structured log viewer
  # Ports 5341 (ingestion) and 8081 (UI) are exposed to the host for convenience.
  # In production, consider removing the 8081 mapping or placing Seq behind nginx
  # with authentication to avoid exposing the log viewer to the public internet.
  seq:
    image: datalust/seq:latest
    container_name: status-tracker-seq
    restart: unless-stopped
    ports:
      - "127.0.0.1:5341:5341"   # ingestion — bind to loopback; app uses internal network
      - "127.0.0.1:8081:80"     # UI — bind to loopback; access via SSH tunnel or nginx proxy
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: ${SEQ_PASSWORD:-}
      SEQ_FIRSTRUN_NOAUTHENTICATION: ${SEQ_FIRSTRUN_NOAUTHENTICATION:-true}
    volumes:
      - seq-data:/data
    networks:
      - internal

volumes:
  postgres-data:
  seq-data:

networks:
  internal:
    driver: bridge
  # To use Elastic APM, create an external network and add it to the status-tracker service:
  #   docker network create elastic
  # Then uncomment the following and add "- elastic" to status-tracker.networks above:
  # elastic:
  #   external: true
